<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>{% block title %}DroneX{% endblock %}</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
{% block extra_head %}{% endblock %}
</head>
<body {% block body_attrs %}{% endblock %}>

<nav class="sidebar">
  <div class="side-logo">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
      <path d="M12 3L3 8.5v7L12 21l9-5.5v-7L12 3z" stroke="#E8A33D" stroke-width="1.5" fill="none"/>
      <circle cx="12" cy="12" r="2.5" stroke="#E8A33D" stroke-width="1.5" fill="none"/>
      <line x1="12" y1="6" x2="12" y2="9.5" stroke="#E8A33D" stroke-width="1.5"/>
      <line x1="12" y1="14.5" x2="12" y2="18" stroke="#E8A33D" stroke-width="1.5"/>
      <line x1="6.5" y1="9" x2="9.5" y2="10.5" stroke="#E8A33D" stroke-width="1.5"/>
      <line x1="14.5" y1="13.5" x2="17.5" y2="15" stroke="#E8A33D" stroke-width="1.5"/>
    </svg>
  </div>
  <a href="/" class="side-icon {{ 'active' if active=='plan' else '' }}" title="Plan a mission">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <circle cx="12" cy="12" r="9"/>
      <line x1="12" y1="3" x2="12" y2="7"/>
      <line x1="12" y1="17" x2="12" y2="21"/>
      <line x1="3" y1="12" x2="7" y2="12"/>
      <line x1="17" y1="12" x2="21" y2="12"/>
      <circle cx="12" cy="12" r="1.5"/>
    </svg>
  </a>
  <a href="/dashboard" class="side-icon {{ 'active' if active=='live' else '' }}" title="Live telemetry">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <polyline points="2 12 6 12 9 6 12 18 15 9 18 12 22 12"/>
    </svg>
  </a>
  <a href="/history" class="side-icon {{ 'active' if active=='log' else '' }}" title="Flight log">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <line x1="3" y1="5" x2="21" y2="5"/>
      <line x1="3" y1="9" x2="21" y2="9"/>
      <line x1="3" y1="13" x2="15" y2="13"/>
      <line x1="3" y1="17" x2="11" y2="17"/>
    </svg>
  </a>
  <div class="side-spacer"></div>
  <a href="#" class="side-icon" title="Settings" onclick="openSettings(); return false;">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <circle cx="12" cy="12" r="3"/>
      <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.6 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.6a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
    </svg>
  </a>
  <div class="side-avatar"></div>
</nav>

<div class="topbar-global">
  <div class="tb-left">
    <div class="tb-brand">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
        <path d="M12 3L3 8.5v7L12 21l9-5.5v-7L12 3z" stroke="#E8A33D" stroke-width="1.5" fill="none"/>
        <circle cx="12" cy="12" r="2.5" stroke="#E8A33D" stroke-width="1.5" fill="none"/>
        <line x1="12" y1="6" x2="12" y2="9.5" stroke="#E8A33D" stroke-width="1.5"/>
        <line x1="12" y1="14.5" x2="12" y2="18" stroke="#E8A33D" stroke-width="1.5"/>
      </svg>
      <span class="tb-name">DroneX</span>
    </div>
    <span class="tb-sep"></span>
    <div class="tb-sub">
      <span class="tb-mission">Air quality response</span>
    </div>
  </div>
  <div class="fill"></div>
  <div class="tb-status-cluster">
    <span class="tb-pill ok"><span class="pdot"></span>Connected</span>
    <span class="tb-sep"></span>
    <span class="tb-clock" id="tbClock">--:--</span>
    <span class="tb-sep"></span>
    <button class="tb-gear" title="Settings" onclick="openSettings()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.6 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.6a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </button>
  </div>
</div>

<div class="settings-modal" id="settingsModal" style="display:none;">
  <div class="settings-backdrop" onclick="closeSettings()"></div>
  <div class="settings-panel">
    <div class="settings-head">
      <h2>Settings</h2>
      <button class="settings-close" onclick="closeSettings()" title="Close">&times;</button>
    </div>
    <label class="settings-field">
      <span>Home base latitude</span>
      <input type="number" id="setHomeLat" step="0.0001" placeholder="35.7796">
    </label>
    <label class="settings-field">
      <span>Home base longitude</span>
      <input type="number" id="setHomeLon" step="0.0001" placeholder="-78.6382">
    </label>
    <label class="settings-field">
      <span>Max round-trip range (miles)</span>
      <input type="number" id="setRange" step="0.1" placeholder="3.0">
    </label>
    <p class="settings-note">Stored in your browser. On the planning page this overrides the default home base and drone range.</p>
    <div class="settings-actions">
      <button class="btn-secondary" onclick="resetSettings()">Reset</button>
      <button class="btn-primary-grad" onclick="saveSettings()">Save</button>
    </div>
  </div>
</div>

{% block content %}{% endblock %}

<div id="toastStack" class="toast-stack"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
  (function () {
    var el = document.getElementById('tbClock');
    if (!el) return;
    function tick() { el.textContent = new Date().toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' }); }
    tick();
    setInterval(tick, 10000);
  })();
</script>
{% block extra_scripts %}{% endblock %}
</body>
</html>
